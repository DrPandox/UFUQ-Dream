<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رسائل الليلة — قاب حلم</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/mokhtarbsaid/rare-arabic-fonts/theyearofthecamel/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --f-display: 'theyearofthecamel','Amiri',serif;
  --f-body:    'theyearofthecamel','Cairo',sans-serif;
  --bg:   #2a0312;
  --gold: #c7a887;
  --gold-l: #d9c4a4;
  --cream: #faf7f2;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { -webkit-text-size-adjust:100%; }
body {
  background: var(--bg); color: var(--cream);
  font-family: var(--f-body); direction: rtl;
  min-height: 100vh; -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

#starsBg {
  position: fixed; top:0; left:0; width:100%; height:100%;
  pointer-events:none; z-index:0;
}

/* Header */
.hdr {
  position: sticky; top:0; z-index: 50;
  padding: 16px max(20px, calc(50% - 560px));
  display: flex; align-items: center; gap: 16px;
  background: linear-gradient(180deg, rgba(42,3,18,0.96) 0%, rgba(42,3,18,0) 100%);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
}
.hdr-back {
  display: flex; align-items: center; gap: 6px;
  color: rgba(199,168,135,0.55); text-decoration: none;
  font-family: var(--f-body); font-size: 14px; transition: color 0.2s;
}
.hdr-back:hover { color: var(--gold); }
.hdr-title {
  flex:1; text-align:center;
  font-family: var(--f-display); font-size: 22px;
  color: rgba(250,247,242,0.85);
}
.hdr-spacer { width: 70px; }

/* Hero */
.hero-area {
  position: relative; z-index:2;
  padding: 56px max(20px, calc(50% - 560px)) 40px;
  text-align: center;
}
.hero-lbl {
  font-size: 12px; letter-spacing: 5px;
  color: rgba(199,168,135,0.4); text-transform: uppercase;
  margin-bottom: 14px;
}
.hero-title {
  font-family: var(--f-display);
  font-size: clamp(28px, 7vw, 48px);
  color: var(--cream); line-height: 1.5; margin-bottom: 12px;
}
.hero-title em { color: var(--gold-l); font-style: normal; }
.hero-count {
  font-family: var(--f-display); font-size: 16px;
  color: rgba(199,168,135,0.5);
}

/* Grid */
.msgs-wrap {
  position: relative; z-index: 2;
  padding: 0 max(16px, calc(50% - 560px)) 80px;
  columns: 1 300px; column-gap: 14px;
}
@media (min-width: 600px)  { .msgs-wrap { columns: 2 260px; } }
@media (min-width: 1000px) { .msgs-wrap { columns: 3 280px; } }

.msg-card {
  break-inside: avoid; margin-bottom: 14px;
  background: linear-gradient(145deg, rgba(64,4,20,0.55), rgba(42,3,18,0.4));
  border: 1px solid rgba(199,168,135,0.12);
  border-radius: 14px; padding: 22px 20px;
  animation: cardIn 0.5s ease both;
  position: relative; overflow: hidden;
}
.msg-card::before {
  content: '\201C';
  font-family: var(--f-display); font-size: 80px;
  color: rgba(199,168,135,0.04);
  position: absolute; top: -8px; right: 10px;
  line-height: 1; pointer-events: none;
}
@keyframes cardIn {
  from { opacity:0; transform: translateY(18px); }
  to   { opacity:1; transform: translateY(0); }
}
.msg-text {
  font-family: var(--f-display); font-size: 19px;
  line-height: 2; color: rgba(255,255,255,0.9);
  margin-bottom: 16px; word-break: break-word;
}
.msg-meta {
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid rgba(199,168,135,0.08);
  padding-top: 10px; gap: 8px;
}
.msg-author {
  font-family: var(--f-display); font-size: 14px;
  color: var(--gold-l); opacity: 0.75;
}
.msg-time {
  font-size: 11px; color: rgba(199,168,135,0.3);
  font-family: var(--f-body);
  white-space: nowrap;
}

/* Empty */
.msgs-empty {
  position: relative; z-index:2;
  padding: 80px 20px; text-align: center;
}
.msgs-empty-icon { font-size: 44px; opacity: 0.2; margin-bottom: 16px; }
.msgs-empty-txt {
  font-family: var(--f-display); font-size: 20px;
  color: rgba(255,255,255,0.3); line-height: 2.1;
}

/* Loading */
.msgs-loading {
  position: relative; z-index:2;
  padding: 80px 20px; text-align: center;
  color: rgba(199,168,135,0.4);
  font-family: var(--f-display); font-size: 18px;
}
</style>
</head>
<body>
<canvas id="starsBg"></canvas>

<div class="hdr">
  <a class="hdr-back" href="main.html">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
    رجوع
  </a>
  <div class="hdr-title">رسائل الليلة</div>
  <div class="hdr-spacer"></div>
</div>

<div class="hero-area">
  <div class="hero-lbl">MESSAGES · الذاكرة</div>
  <h1 class="hero-title">كلماتٌ كُتبت<br>لتبقى في <em>قاب حلم</em></h1>
  <p class="hero-count" id="msg-count"></p>
</div>

<div class="msgs-loading" id="msgs-loading">جاري التحميل…</div>
<div class="msgs-empty"   id="msgs-empty"   style="display:none;">
  <div class="msgs-empty-icon">✦</div>
  <p class="msgs-empty-txt">لا توجد رسائل بعد<br>كن أول من يكتب</p>
</div>
<div class="msgs-wrap" id="msgs-wrap"></div>

<script>
// ── BACKEND ──
const BACKEND_URL = 'https://YOUR_DO_APP.ondigitalocean.app'; // ← update after deploy

// ── STARS ──
(function() {
  const cv = document.getElementById('starsBg');
  const ctx = cv.getContext('2d');
  let W, H, stars = [], last = 0;
  function resize() {
    W = cv.width  = window.innerWidth;
    H = cv.height = window.innerHeight;
    stars = [];
    const n = Math.floor((W * H) / 5500);
    for (let i = 0; i < n; i++) {
      stars.push({
        x: Math.random()*W, y: Math.random()*H,
        r: Math.random()*0.9+0.15,
        ph: Math.random()*6.28,
        sp: Math.random()*0.5+0.2
      });
    }
  }
  function draw(t) {
    requestAnimationFrame(draw);
    if (t - last < 33) return; last = t;
    ctx.clearRect(0,0,W,H);
    for (const s of stars) {
      s.ph += s.sp * 0.012;
      const a = 0.3 * (0.5 + 0.5 * Math.sin(s.ph));
      ctx.globalAlpha = a;
      ctx.fillStyle = '#e8d5b8';
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  resize(); requestAnimationFrame(draw);
  window.addEventListener('resize', resize);
})();

// ── MESSAGES ──
function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleTimeString('ar-SA', { hour:'2-digit', minute:'2-digit' });
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderMessages(items) {
  document.getElementById('msgs-loading').style.display = 'none';
  const count = document.getElementById('msg-count');
  count.textContent = items.length ? `${items.length} رسالة` : '';
  const empty = document.getElementById('msgs-empty');
  const wrap  = document.getElementById('msgs-wrap');
  if (items.length === 0) { empty.style.display = 'block'; wrap.innerHTML = ''; return; }
  empty.style.display = 'none';
  wrap.innerHTML = items.map((m, i) => `
    <div class="msg-card" style="animation-delay:${Math.min(i * 0.06, 0.6)}s">
      <p class="msg-text">${escHtml(m.text)}</p>
      <div class="msg-meta">
        <span class="msg-author">— ${escHtml(m.from)}</span>
        <span class="msg-time">${formatTime(m.sentAt)}</span>
      </div>
    </div>
  `).join('');
}

function loadMessages() {
  fetch(BACKEND_URL + '/api/messages')
    .then(r => r.json())
    .then(renderMessages)
    .catch(() => { document.getElementById('msgs-loading').style.display = 'none'; });
}

loadMessages();
setInterval(loadMessages, 6000); // refresh every 6 seconds
</script>
</body>
</html>
