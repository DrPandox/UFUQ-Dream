<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قاب حلم — UFUQ Graduation 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --f-display : 'Amiri',"Geeza Pro","Traditional Arabic","Arabic Typesetting",Georgia,serif;
  --f-body    : 'Cairo',"Geeza Pro","Arabic Typesetting",Tahoma,Arial,sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { -webkit-text-size-adjust:100%; }

body {
  background-color: #2a0312;
  color: #faf7f2;
  font-family: var(--f-body);
  direction: rtl;
  overflow: hidden;
  height: 100vh;
  -webkit-font-smoothing: antialiased;
}

#rainCanvas {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 3;
}

/* ══ GATE ══ */
#gate {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  z-index: 10;
  display: flex; flex-direction: column;
  align-items: center;
  text-align: center;
  transition: opacity 0.9s ease, transform 0.9s ease;
  background:
    radial-gradient(ellipse 130% 80% at 100% 0%,
      rgba(220, 20, 100, 0.75) 0%,
      rgba(160, 10, 65, 0.40) 35%,
      transparent 65%
    ),
    #2a0312;
}
#gate.hide {
  opacity: 0; pointer-events: none; transform: scale(1.04);
}

.gate-shadow-ray-warm {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; z-index: 0;
  background: linear-gradient(
    255deg,
    rgba(200, 140, 90, 0.18) 0%,
    rgba(180, 120, 70, 0.10) 22%,
    rgba(160, 100, 60, 0.05) 42%,
    transparent 58%
  );
}

/* ── Logo reveal: clip-path wipes left → right ── */
@keyframes logoReveal {
  0%   { clip-path: inset(0 100% 0 0); opacity: 1; }
  100% { clip-path: inset(0 0% 0 0);   opacity: 1; }
}
/* After logo lands, content drops in */
@keyframes dropIn {
  0%   { opacity: 0; transform: translateY(-22px); }
  100% { opacity: 1; transform: translateY(0); }
}
/* Arc & title scale+fade from behind the logo origin point */
@keyframes arcDrop {
  0%   { opacity: 0; transform: translateY(-30px) scale(0.9); }
  100% { opacity: 1; transform: translateY(0)    scale(1); }
}

.gate-logo-wrap {
  padding: 30px 24px 0;
  display: flex; flex-direction: row;
  align-items: center; justify-content: center;
  flex-shrink: 0;
  position: relative; z-index: 2;
}
.gate-logo-icon {
  width: 72px; height: 72px; object-fit: contain;
  /* Wipe in left-to-right over 0.7s, starts immediately */
  animation: logoReveal 0.7s 0.1s cubic-bezier(0.4,0,0.2,1) both;
}

/* Everything below animates with delay after logo finishes */
.gate-main          { animation: dropIn 0.7s 0.6s ease both; }
.gate-info-bar {
  animation: dropIn 0.6s 0.75s ease both;
  display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
  padding: 0 16px; margin-bottom: 6px;
}
.gate-info-item {
  background: rgba(199,168,135,0.08); border: 1px solid rgba(199,168,135,0.18);
  border-radius: 20px; padding: 4px 12px; font-size: 12px;
  color: rgba(255,255,255,0.5); font-family: var(--f-body);
  display: flex; align-items: center; gap: 5px;
}
.gate-silhouettes   { animation: dropIn 0.6s 0.85s ease both; }

.gate-main {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 0 24px; width: 100%;
  max-width: 440px;
  position: relative; z-index: 2;
}

.gate-arc-wrap {
  width: min(300px, 78vw);
  height: min(150px, 39vw);
  margin-bottom: -16px;
  flex-shrink: 0; position: relative;
}
.gate-arc-img { width: 100%; height: 100%; object-fit: contain; }

.gate-title-img {
  width: clamp(200px, 62vw, 300px);
  margin-bottom: 14px;
}

.gate-prompt {
  font-family: var(--f-display); font-size: 14px;
  color: rgba(255,255,255,0.45); margin-bottom: 12px; line-height: 1.75;
}

.gate-input-wrap { width: 100%; max-width: 280px; margin-bottom: 10px; }
.gate-input {
  width: 100%; background-color: rgba(46,3,15,0.6);
  border: 1px solid rgba(255,255,255,0.18); border-radius: 12px;
  padding: 12px 18px;
  font-family: var(--f-display); font-size: 16px;
  color: #faf7f2; text-align: center; direction: rtl;
  outline: none; transition: border-color 0.3s, box-shadow 0.3s;
}
.gate-input:focus { border-color: rgba(199,168,135,0.6); box-shadow: 0 0 20px rgba(199,168,135,0.1); }
.gate-input::placeholder { color: rgba(255,255,255,0.28); font-size: 13px; }

.gate-btn {
  width: 100%; max-width: 280px;
  background: linear-gradient(135deg,#c7a887,#907055);
  color: #38040f; font-family: var(--f-display); font-size: 15px;
  font-weight: 700; padding: 12px;
  border-radius: 12px; border: none; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 4px 28px rgba(199,168,135,0.3);
  transition: opacity 0.2s;
}
.gate-btn:active { opacity: 0.82; }

.gate-err {
  font-size: 12px; color: rgba(199,168,135,0.58);
  margin-top: 8px; height: 16px;
  font-family: var(--f-body);
  transition: opacity 0.3s; opacity: 0;
}
.gate-err.show { opacity: 1; }

/* ── ROLE TOGGLE ── */
.role-row {
  display: flex; gap: 8px;
  width: 100%; max-width: 280px;
  margin-bottom: 14px;
}
.role-btn {
  flex: 1;
  background: rgba(46,3,15,0.6);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 10px;
  color: rgba(255,255,255,0.38);
  font-family: var(--f-display); font-size: 15px;
  padding: 10px 6px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: border-color 0.25s, color 0.25s, background 0.25s;
}
.role-btn.active {
  border-color: rgba(199,168,135,0.7);
  color: #faf7f2;
  background: rgba(199,168,135,0.10);
}
.role-btn:active { opacity: 0.75; }

.gate-deco-bottom {
  display: block;
  width: clamp(120px,50vw,220px);
  margin: 10px auto 0; opacity: 0.9;
}
.gate-deco-divider { height: 14px; width: auto; object-fit: contain; opacity: 0.9; flex-shrink: 0; }

.gate-slogan {
  flex-shrink: 0;
  position: relative; z-index: 2;
  font-family: var(--f-display);
  font-size: clamp(14px, 4vw, 18px);
  color: rgba(199,168,135,0.72);
  letter-spacing: 0.5px;
  text-align: center;
  padding: 6px 24px 10px;
  animation: dropIn 0.7s 0.9s ease both;
}
.gate-slogan em {
  font-style: normal;
  color: rgba(250,247,242,0.88);
}

.gate-silhouettes {
  width: 100%; max-width: 480px;
  display: flex; flex-direction: column;
  justify-content: flex-end; align-items: center;
  flex-shrink: 0; position: relative;
  padding-bottom: 10px; margin-bottom: 95px;
  z-index: 2;
}
.gate-silhouettes img {
  width: min(110px, 28vw); display: block;
  object-fit: contain; position: relative; z-index: 2;
  margin-bottom: 10px; margin-top: 10px;
}

.gate-horizon {
  position: absolute; bottom: -45px; left: 50%;
  transform: translateX(-50%);
  width: 200%; height: 130px;
  background: radial-gradient(ellipse 100% 100% at 50% 50%,
    rgba(241, 119, 158, 0.8) 0%,
    rgba(180, 30, 80, 0.50) 35%,
    rgba(140, 15, 60, 0.20) 60%,
    transparent 80%);
  filter: blur(25px);
  border-radius: 50%; pointer-events: none; z-index: 0;
}


/* ── Small phones ── */
@media (max-width: 480px) {
  .gate-logo-wrap { padding: 18px 16px 0; }
  .gate-logo-icon { width: clamp(52px, 16vw, 72px); height: clamp(52px, 16vw, 72px); }
  .gate-arc-wrap { width: min(280px, 74vw); height: min(140px, 37vw); margin-bottom: -12px; }
  .gate-title-img { width: clamp(160px, 58vw, 280px); margin-bottom: 8px; }
  .gate-main { padding: 0 14px; }
  .gate-prompt { font-size: clamp(12px, 3.5vw, 14px); margin-bottom: 8px; }
  .gate-input-wrap { max-width: min(88vw, 280px); }
  .gate-input { font-size: clamp(14px, 4vw, 16px); padding: 10px 14px; }
  .gate-btn { font-size: clamp(13px, 3.8vw, 15px); padding: 10px; max-width: min(88vw, 280px); }
  .gate-deco-bottom { width: clamp(100px, 44vw, 200px); }
  .gate-silhouettes img { width: min(22vw, 100px); }
  .gate-silhouettes { margin-bottom: clamp(40px, 12vw, 95px); }
  .gate-horizon { height: clamp(80px, 22vw, 160px); }
}
@media (max-width: 380px) {
  .gate-info-item { font-size: 10px; padding: 3px 6px; }
  .gate-arc-wrap { width: min(240px, 70vw); height: min(120px, 35vw); }
  .gate-title-img { width: 55vw; }
  .gate-input { font-size: 13px; }
}
</style>
</head>
<body>

<div id="gate">
  <canvas id="rainCanvas"></canvas>
  <div class="gate-shadow-ray-warm"></div>

  <!-- Logo -->
  <div class="gate-logo-wrap">
    <img class="gate-logo-icon" src="assets/UFUQ logo.png" alt="UFUQ">
  </div>

  <!-- Main -->
  <div class="gate-main">
    <div class="gate-arc-wrap">
      <img src="assets/logo.svg" alt="" class="gate-arc-img">
    </div>
    <img class="gate-title-img" src="assets/قاب حلم.png" alt="قاب حلم">
    <p class="gate-prompt">سجّل بياناتك للدخول</p>

    <div class="role-row">
      <button class="role-btn" id="role-student" onclick="setRole('student')">طالب</button>
      <button class="role-btn" id="role-parent"  onclick="setRole('parent')">ولي أمر</button>
      <button class="role-btn" id="role-visitor" onclick="setRole('visitor')">زائر</button>
    </div>

    <div class="gate-input-wrap">
      <input class="gate-input" type="text" id="guest-input"
        placeholder="اكتب اسمك هنا" maxlength="30"
        autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="gate-input-wrap" style="margin-bottom:10px;">
      <input class="gate-input" type="tel" id="guest-phone"
        placeholder="رقم الجوال" maxlength="15"
        autocomplete="off" dir="ltr">
    </div>

    <button class="gate-btn" id="enter-btn">ادخل إلى قاب حلم</button>
    <div class="gate-err" id="gate-err"></div>
    <img src="assets/اقرب.png" alt="" class="gate-deco-bottom">
  </div>

  <!-- Info bar -->
  <div class="gate-info-bar" id="gate-info-bar" style="display:none">
    <span class="gate-info-item" id="gi-date"></span>
    <span class="gate-info-item" id="gi-time"></span>
    <span class="gate-info-item" id="gi-venue"></span>
  </div>

  <!-- Slogan -->
  <p class="gate-slogan"><em>اقرب مما ظننا…</em> واجمل مما تخيلنا</p>

  <!-- Silhouettes -->
  <div class="gate-silhouettes">
    <div class="gate-horizon"></div>
    <img src="assets/student.png" alt="طالبون">
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  FIREBASE CONFIG
// ══════════════════════════════════════════════════════
//  BACKEND URL — change to your production URL when deploying
// ══════════════════════════════════════════════════════
// ══ BACKEND URL ════════════════════════════════════════
//  This page runs on GitHub Pages. The backend runs on
//  your local server. Set this to your server's LAN IP
//  or hostname so guests on the same network can reach it.
//
//  Examples:
//    http://192.168.1.100:3000   ← your server's LAN IP
//    http://server.local:3000    ← if you set a hostname
//
const BACKEND_URL = 'https://138-68-79-195.nip.io'; // ← CHANGE THIS after deploying

// ─── STATE ───
const cfg = { requireGuestValidation: false };
const _guests = [];

// Load config + guest list from backend
fetch(BACKEND_URL + '/api/config')
  .then(r => r.json())
  .then(d => {
    if (!d) return;
    cfg.requireGuestValidation = !!d.requireGuestValidation;
    // Populate gate info bar
    const bar = document.getElementById('gate-info-bar');
    const date   = d.gateInfoDate   || d.eventDateAr;
    const time   = d.gateInfoTime   || d.eventStartTime;
    const venue  = d.gateInfoVenue  || d.venueName;
    if (date)  document.getElementById('gi-date').textContent  = '📅 ' + date;
    if (time)  document.getElementById('gi-time').textContent  = '🕐 ' + time;
    if (venue) document.getElementById('gi-venue').textContent = '📍 ' + venue;
    if (date || time || venue) bar.style.display = 'flex';
  })
  .catch(() => {});
fetch(BACKEND_URL + '/api/guests')
  .then(r => r.json())
  .then(list => { if (Array.isArray(list)) _guests.push(...list); })
  .catch(() => {});

// ─── GATE LOGIC ───
let selectedRole = null;

function setRole(role) {
  selectedRole = role;
  document.getElementById('role-student').classList.toggle('active', role === 'student');
  document.getElementById('role-parent').classList.toggle('active',  role === 'parent');
  document.getElementById('role-visitor').classList.toggle('active', role === 'visitor');
}

function showErr(msg, duration) {
  const el = document.getElementById('gate-err');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration || 2800);
}

function enterGate() {
  const name  = document.getElementById('guest-input').value.trim();
  const phone = document.getElementById('guest-phone').value.trim();
  if (!selectedRole) { showErr('يرجى اختيار دورك للدخول'); return; }
  if (!name)  { showErr('يرجى كتابة اسمك للدخول'); return; }
  if (!phone) { showErr('يرجى إدخال رقم الجوال'); return; }
  if (!phone.startsWith('07')) { showErr('رقم الجوال يجب أن يبدأ بـ 07'); return; }
  if (cfg.requireGuestValidation) {
    const valid = _guests.some(g => g === name || g.includes(name) || name.includes(g));
    if (!valid) { showErr('عذراً، اسمك غير موجود في قائمة المدعوين', 3000); return; }
  }
  sessionStorage.setItem('guestName', name);
  sessionStorage.setItem('guestPhone', phone);
  sessionStorage.setItem('guestRole', selectedRole);

  // Notify backend — fire and forget, don't block the UX
  fetch(BACKEND_URL + '/api/register', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ name, phone, role: selectedRole })
  }).catch(() => {}); // Silently ignore if backend is offline

  document.getElementById('gate').classList.add('hide');
  setTimeout(() => { window.location.href = 'main.html'; }, 900);
}

document.getElementById('enter-btn').addEventListener('click', enterGate);
document.getElementById('guest-input').addEventListener('keyup', e => { if (e.key === 'Enter') enterGate(); });
document.getElementById('guest-phone').addEventListener('keyup', e => { if (e.key === 'Enter') enterGate(); });

// Pre-fill if returning from main page to edit info
(function prefill() {
  const name  = sessionStorage.getItem('guestName');
  const phone = sessionStorage.getItem('guestPhone');
  const role  = sessionStorage.getItem('guestRole');
  if (name)  document.getElementById('guest-input').value = name;
  if (phone) document.getElementById('guest-phone').value = phone;
  if (role)  setRole(role);
})();

// ─── RAIN ANIMATION (no ctx.filter — uses layered circles) ───
(function initRain() {
  const canvas = document.getElementById('rainCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let W, H, drops = [];
  let arcCache = null, headCache = null;
  let rainAnimReq, lastTime = 0, glowT = 0;

  const resize = () => {
    W = canvas.width  = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
    // Invalidate caches on resize so they're recomputed next frame
    arcCache = null;
    headCache = null;
  };

  const getArcBounds = () => {
    if (arcCache) return arcCache;
    const arc   = document.querySelector('.gate-arc-img');
    const cRect = canvas.getBoundingClientRect();
    if (!arc) return arcCache = { cx: W / 2, bottomY: H * 0.50, R: W * 0.38 };
    const aRect = arc.getBoundingClientRect();
    return arcCache = {
      cx:      aRect.left + aRect.width  / 2 - cRect.left,
      bottomY: aRect.bottom - cRect.top,
      R:       (aRect.width / 2) * 0.92
    };
  };

  const getStudentHead = () => {
    if (headCache) return headCache;
    const img   = document.querySelector('.gate-silhouettes img');
    const cRect = canvas.getBoundingClientRect();
    if (!img) return headCache = { tx: W / 2, ty: H * 0.82 };
    const iRect = img.getBoundingClientRect();
    return headCache = {
      tx: iRect.left + iRect.width  / 2 - cRect.left,
      ty: iRect.top  - cRect.top + iRect.height * 0.08
    };
  };

  const spawnDrop = (randomLife) => {
    const { cx, bottomY, R } = getArcBounds();
    const { tx, ty }         = getStudentHead();
    const depth  = Math.random();
    const speed  = 0.06 + depth * 0.13 + Math.random() * 0.05;
    const theta  = Math.random() * Math.PI;
    const x0     = cx + R * Math.cos(Math.PI - theta);
    const y0     = bottomY - R * Math.sin(theta);
    const spread = W * 0.45;
    const targetX = tx + (Math.random() - 0.5) * spread;
    const targetY = ty + (Math.random() - 0.5) * H * 0.25;
    const dx = targetX - x0, dy = targetY - y0;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const d = {
      x: x0, y: y0,
      vx: (dx / dist) * speed,
      vy: (dy / dist) * speed,
      r: 0.3 + depth * 1.5,
      depth,
      alpha: 0, life: 0,
      maxLife: 2000 + Math.random() * 1500,
      gold: Math.random() < 0.65
    };
    if (randomLife) {
      d.life = Math.random() * d.maxLife;
      d.x += d.vx * d.life;
      d.y += d.vy * d.life;
    }
    return d;
  };

  const drawArcGlow = () => {
    const { cx, bottomY } = getArcBounds();
    glowT += 0.006;
    const pulse = 0.75 + 0.25 * Math.sin(glowT);
    const grad = ctx.createRadialGradient(cx, bottomY, 0, cx, bottomY + H * 0.3, H * 0.5);
    grad.addColorStop(0,    `rgba(190,130,70,${(0.20 * pulse).toFixed(3)})`);
    grad.addColorStop(0.4,  `rgba(150,100,52,${(0.08 * pulse).toFixed(3)})`);
    grad.addColorStop(1,    'rgba(110,75,40,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  };

  resize();
  for (let i = 0; i < 30; i++) drops.push(spawnDrop(true));

  const draw = (now) => {
    rainAnimReq = requestAnimationFrame(draw);
    if (now - lastTime < 33) return; // ~30 fps cap
    lastTime = now;

    ctx.clearRect(0, 0, W, H);
    drawArcGlow();

    if (drops.length < 35 && Math.random() < 0.14) drops.push(spawnDrop(false));

    for (let i = drops.length - 1; i >= 0; i--) {
      const d = drops[i];
      d.life += 2; // double increment to match original speed at half the frame rate
      d.x += d.vx;
      d.y += d.vy;

      const t = d.life / d.maxLife;
      if      (t < 0.12) d.alpha = t / 0.12;
      else if (t > 0.65) d.alpha = (1 - t) / 0.35;
      else               d.alpha = 1;

      if (d.life > d.maxLife || d.y > H + 60 || d.x < -60) { drops.splice(i, 1); continue; }

      const gCol = d.gold ? 'rgba(240,215,170,' : 'rgba(245,165,195,';
      const sCol = d.gold ? 'rgba(220,190,140,' : 'rgba(220,100,150,';
      const a    = d.alpha;

      // Outer halo + mid glow — layered circles, no ctx.filter
      ctx.save();
      ctx.fillStyle = gCol + '1)';
      ctx.globalAlpha = a * (0.07 + d.depth * 0.12);
      ctx.beginPath(); ctx.arc(d.x, d.y, d.r * (5 + d.depth * 4), 0, 6.283); ctx.fill();
      ctx.globalAlpha = a * (0.18 + d.depth * 0.20);
      ctx.beginPath(); ctx.arc(d.x, d.y, d.r * (2.5 + d.depth * 1.5), 0, 6.283); ctx.fill();
      ctx.restore();

      // Sharp core with shadow only (cheap single-point shadow)
      ctx.save();
      ctx.globalAlpha  = a * (0.55 + d.depth * 0.45);
      ctx.shadowColor  = sCol + '1)';
      ctx.shadowBlur   = 4 + d.depth * 12;
      ctx.fillStyle    = gCol + '1)';
      ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, 6.283); ctx.fill();
      ctx.restore();
    }
  };

  requestAnimationFrame(draw);
  window.addEventListener('resize', resize);
})();
</script>
</body>
</html>
