<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أرشيف قاب حلم — UFUQ</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --f-display: 'Amiri',"Geeza Pro","Traditional Arabic","Arabic Typesetting",Georgia,serif;
  --f-body: 'Cairo',"Geeza Pro","Arabic Typesetting",Tahoma,Arial,sans-serif;
  --bg: #2a0312;
  --gold: #c7a887;
  --gold-l: #d9c4a4;
  --cream: #faf7f2;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { height:100%; -webkit-text-size-adjust:100%; }

body {
  background-color: var(--bg);
  color: var(--cream);
  font-family: var(--f-body);
  direction: rtl;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Stars canvas ── */
#starsBg {
  position: fixed; top:0; left:0;
  width:100%; height:100%;
  pointer-events:none; z-index:0;
}

/* ── Top bar ── */
.arc-header {
  position: sticky; top: 0; z-index: 50;
  padding: 18px max(20px, calc(50% - 560px));
  display: flex; align-items: center; gap: 16px;
  background: linear-gradient(180deg, rgba(42,3,18,0.96) 0%, rgba(42,3,18,0.0) 100%);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.arc-back {
  display: flex; align-items: center; gap: 6px;
  color: rgba(199,168,135,0.6); text-decoration: none;
  font-family: var(--f-body); font-size: 13px;
  transition: color 0.2s;
}
.arc-back:hover { color: var(--gold); }
.arc-header-title {
  flex: 1; text-align: center;
  font-family: var(--f-display); font-size: 20px;
  color: rgba(250,247,242,0.82);
}
.arc-header-spacer { width: 80px; }

/* ── Hero area ── */
.arc-hero {
  position: relative; z-index: 2;
  padding: 60px max(20px, calc(50% - 560px)) 48px;
  text-align: center;
}
.arc-hero-label {
  font-size: 11px; letter-spacing: 4px; color: rgba(199,168,135,0.4);
  text-transform: uppercase; margin-bottom: 14px;
}
.arc-hero-title {
  font-family: var(--f-display); font-size: clamp(28px, 7vw, 48px);
  color: var(--cream); line-height: 1.5; margin-bottom: 12px;
}
.arc-hero-title em { color: var(--gold-l); font-style: normal; }
.arc-hero-sub {
  font-family: var(--f-display); font-size: clamp(14px, 3.5vw, 17px);
  color: rgba(250,247,242,0.42); line-height: 2.1;
}

/* ── Year filter tabs ── */
.arc-tabs {
  position: relative; z-index: 2;
  padding: 0 max(20px, calc(50% - 560px)) 32px;
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
}
.arc-tab {
  padding: 7px 20px; border-radius: 20px;
  background: rgba(199,168,135,0.06);
  border: 1px solid rgba(199,168,135,0.15);
  color: rgba(199,168,135,0.55);
  font-family: var(--f-body); font-size: 13px;
  cursor: pointer; transition: all 0.2s;
}
.arc-tab.active, .arc-tab:hover {
  background: rgba(199,168,135,0.12);
  border-color: rgba(199,168,135,0.40);
  color: var(--gold-l);
}
.arc-tab.active { font-weight: 600; }

/* ── Grid ── */
.arc-grid {
  position: relative; z-index: 2;
  padding: 0 max(16px, calc(50% - 560px)) 80px;
  columns: 2 160px; column-gap: 10px;
}
@media (min-width: 600px) { .arc-grid { columns: 3 180px; column-gap: 12px; } }
@media (min-width: 900px) { .arc-grid { columns: 4 200px; column-gap: 14px; } }

.arc-item {
  break-inside: avoid; margin-bottom: 10px;
  border-radius: 10px; overflow: hidden;
  position: relative; cursor: pointer;
  background: rgba(64,4,20,0.6);
  border: 1px solid rgba(199,168,135,0.10);
  transition: transform 0.22s, box-shadow 0.22s;
}
.arc-item:hover { transform: translateY(-3px); box-shadow: 0 12px 36px rgba(0,0,0,0.5); }

.arc-item img {
  width: 100%; height: auto; display: block;
  object-fit: cover;
}
.arc-item .arc-play-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(42,3,18,0.45);
}
.arc-play-icon {
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(199,168,135,0.25);
  border: 1.5px solid rgba(199,168,135,0.5);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: var(--gold-l);
}
.arc-item-caption {
  padding: 8px 10px;
  font-family: var(--f-display); font-size: 12px;
  color: rgba(250,247,242,0.5); line-height: 1.6;
}
.arc-year-badge {
  position: absolute; top: 7px; right: 7px;
  background: rgba(42,3,18,0.75);
  border: 1px solid rgba(199,168,135,0.22);
  border-radius: 6px; padding: 2px 7px;
  font-size: 10px; color: rgba(199,168,135,0.65);
  font-family: var(--f-body); letter-spacing: 0.5px;
  backdrop-filter: blur(4px);
}

/* ── Empty state ── */
.arc-empty {
  position: relative; z-index: 2;
  padding: 80px 20px; text-align: center;
}
.arc-empty-icon { font-size: 48px; opacity: 0.2; margin-bottom: 16px; }
.arc-empty-txt {
  font-family: var(--f-display); font-size: 17px;
  color: rgba(250,247,242,0.3); line-height: 2.1;
}

/* ── Loading ── */
.arc-loading {
  position: relative; z-index: 2;
  padding: 80px 20px; text-align: center;
  color: rgba(199,168,135,0.4); font-family: var(--f-display); font-size: 16px;
}

/* ── Lightbox ── */
.lightbox {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(20,2,10,0.95);
  align-items: center; justify-content: center;
  padding: 20px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.lightbox.open { display: flex; }
.lightbox-inner {
  position: relative;
  max-width: min(900px, 96vw);
  max-height: 90vh;
  width: 100%;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
}
.lightbox-inner img {
  max-width: 100%; max-height: 80vh;
  object-fit: contain; border-radius: 10px;
  box-shadow: 0 20px 80px rgba(0,0,0,0.7);
}
.lightbox-inner video {
  max-width: 100%; max-height: 80vh;
  border-radius: 10px;
  box-shadow: 0 20px 80px rgba(0,0,0,0.7);
}
.lightbox-caption {
  font-family: var(--f-display); font-size: 15px;
  color: rgba(250,247,242,0.55); text-align: center;
}
.lightbox-close {
  position: absolute; top: -40px; left: 0;
  background: none; border: none;
  color: rgba(199,168,135,0.6); font-size: 28px; cursor: pointer;
  transition: color 0.2s;
}
.lightbox-close:hover { color: var(--gold); }
.lightbox-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: rgba(42,3,18,0.6);
  border: 1px solid rgba(199,168,135,0.2);
  color: rgba(199,168,135,0.6); font-size: 22px;
  width: 42px; height: 42px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s;
  backdrop-filter: blur(4px);
}
.lightbox-nav:hover { color: var(--gold); border-color: rgba(199,168,135,0.5); }
.lightbox-nav.prev { right: calc(100% + 8px); }
.lightbox-nav.next { left: calc(100% + 8px); }
@media (max-width: 600px) {
  .lightbox-nav.prev { right: unset; left: 4px; top: unset; bottom: -48px; transform: none; }
  .lightbox-nav.next { left: unset; right: 4px; top: unset; bottom: -48px; transform: none; }
}
</style>
</head>
<body>

<canvas id="starsBg"></canvas>

<div class="arc-header">
  <a class="arc-back" href="main.html">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    رجوع
  </a>
  <div class="arc-header-title">أرشيف قاب حلم</div>
  <div class="arc-header-spacer"></div>
</div>

<div class="arc-hero">
  <div class="arc-hero-label">ARCHIVE · الذاكرة</div>
  <h1 class="arc-hero-title">فصلٌ مضى..<br>وبصمةٌ <em>تبقى</em></h1>
  <p class="arc-hero-sub">
    لحظات صعود سكنت الذاكرة<br>
    ميراث قاب حلم في صور وذكريات
  </p>
</div>

<div class="arc-tabs" id="arc-tabs">
  <div class="arc-tab active" data-year="all" onclick="filterYear('all')">الكل</div>
</div>

<div class="arc-loading" id="arc-loading">جاري التحميل…</div>
<div class="arc-empty" id="arc-empty" style="display:none;">
  <div class="arc-empty-icon">◈</div>
  <p class="arc-empty-txt">لم يُضف أي محتوى بعد<br>قريبًا تُفتح نافذة الذاكرة</p>
</div>
<div class="arc-grid" id="arc-grid"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightboxIfBg(event)">
  <div class="lightbox-inner">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <button class="lightbox-nav prev" onclick="navLightbox(-1)">›</button>
    <button class="lightbox-nav next" onclick="navLightbox(1)">‹</button>
    <img id="lb-img" src="" alt="" style="display:none;">
    <video id="lb-vid" controls style="display:none;"></video>
    <div class="lightbox-caption" id="lb-cap"></div>
  </div>
</div>

<script>
// ══ BACKEND ══
const BACKEND_URL = 'https://138-68-79-195.nip.io'; // ← update after deploy

// ══ STARS ══
(function initStars() {
  const cv = document.getElementById('starsBg');
  const ctx = cv.getContext('2d');
  let W, H, stars = [];
  function resize() {
    W = cv.width  = window.innerWidth;
    H = cv.height = window.innerHeight;
  }
  function seed() {
    stars = [];
    const n = Math.round((W * H) / 5500);
    for (let i = 0; i < n; i++) {
      stars.push({
        x: Math.random() * W, y: Math.random() * H,
        r: Math.random() * 0.85 + 0.15,
        a: Math.random(), da: (Math.random() * 0.006 + 0.002) * (Math.random() < 0.5 ? 1 : -1)
      });
    }
  }
  let last = 0;
  function draw(t) {
    requestAnimationFrame(draw);
    if (t - last < 33) return; last = t;
    ctx.clearRect(0, 0, W, H);
    for (const s of stars) {
      s.a = Math.max(0.05, Math.min(1, s.a + s.da));
      if (s.a <= 0.05 || s.a >= 1) s.da *= -1;
      ctx.globalAlpha = s.a * 0.55;
      ctx.fillStyle   = '#e8d5b8';
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  resize(); seed(); requestAnimationFrame(draw);
  window.addEventListener('resize', () => { resize(); seed(); });
})();

// ══ DATA ══
let allItems = [];
let filteredItems = [];
let activeYear = 'all';
let lbIndex = 0;

fetch(BACKEND_URL + '/api/archive').then(r => r.json()).then(data => {
  document.getElementById('arc-loading').style.display = 'none';
  allItems = (Array.isArray(data) ? data : []).sort((a, b) => (b.year || 0) - (a.year || 0));

  if (allItems.length === 0) {
    document.getElementById('arc-empty').style.display = 'block';
    return;
  }

  // Build year tabs
  const years = [...new Set(allItems.map(i => i.year).filter(Boolean))].sort((a, b) => b - a);
  const tabsEl = document.getElementById('arc-tabs');
  years.forEach(y => {
    const t = document.createElement('div');
    t.className = 'arc-tab';
    t.dataset.year = y;
    t.textContent = y;
    t.onclick = () => filterYear(y);
    tabsEl.appendChild(t);
  });

  filterYear('all');
});

function filterYear(year) {
  activeYear = year;
  document.querySelectorAll('.arc-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.year === String(year));
  });
  filteredItems = year === 'all' ? allItems : allItems.filter(i => String(i.year) === String(year));
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('arc-grid');
  grid.innerHTML = '';
  filteredItems.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'arc-item';
    div.onclick = () => openLightbox(idx);

    const isVideo = item.type === 'video';
    const thumb = item.thumbnail || item.url;

    div.innerHTML = `
      <img src="${escHtml(thumb)}" alt="${escHtml(item.caption || '')}" loading="lazy">
      ${isVideo ? `<div class="arc-play-overlay"><div class="arc-play-icon">▶</div></div>` : ''}
      ${item.year ? `<div class="arc-year-badge">${item.year}</div>` : ''}
      ${item.caption ? `<div class="arc-item-caption">${escHtml(item.caption)}</div>` : ''}
    `;
    grid.appendChild(div);
  });

  const empty = document.getElementById('arc-empty');
  empty.style.display = filteredItems.length === 0 ? 'block' : 'none';
}

// ══ LIGHTBOX ══
function openLightbox(idx) {
  lbIndex = idx;
  showLightboxItem();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  const lb = document.getElementById('lightbox');
  lb.classList.remove('open');
  document.body.style.overflow = '';
  const vid = document.getElementById('lb-vid');
  vid.pause(); vid.src = '';
}
function closeLightboxIfBg(e) {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
}
function navLightbox(dir) {
  lbIndex = (lbIndex + dir + filteredItems.length) % filteredItems.length;
  showLightboxItem();
}
function showLightboxItem() {
  const item = filteredItems[lbIndex];
  if (!item) return;
  const img = document.getElementById('lb-img');
  const vid = document.getElementById('lb-vid');
  const cap = document.getElementById('lb-cap');
  if (item.type === 'video') {
    img.style.display = 'none';
    vid.style.display = 'block';
    vid.src = item.url;
  } else {
    vid.pause(); vid.src = '';
    vid.style.display = 'none';
    img.style.display = 'block';
    img.src = item.url;
  }
  cap.textContent = item.caption || '';
}

// ══ UTILS ══
function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Keyboard nav
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft')  navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});
</script>
</body>
</html>
