<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ذكرى الليلة — قاب حلم</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --f-display: 'Amiri',"Geeza Pro","Traditional Arabic","Arabic Typesetting",Georgia,serif;
  --f-body:    'Cairo',"Geeza Pro","Arabic Typesetting",Tahoma,Arial,sans-serif;
  --bg:   #2a0312;
  --gold: #c7a887;
  --gold-l: #d9c4a4;
  --cream: #faf7f2;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { height:100%; -webkit-text-size-adjust:100%; }

body {
  background: var(--bg);
  color: var(--cream);
  font-family: var(--f-body);
  direction: rtl;
  min-height: 100%;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* Stars */
#starsBg {
  position: fixed; top:0; left:0;
  width:100%; height:100%;
  pointer-events:none; z-index:0;
}

/* Entry animation */
#app {
  animation: pageIn 1.1s cubic-bezier(0.25,0.46,0.45,0.94) both;
}
@keyframes pageIn {
  0%   { opacity:0; transform: scale(1.04); }
  100% { opacity:1; transform: scale(1); }
}

/* Layout */
.wrap {
  position: relative; z-index: 2;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding: 48px max(20px, calc(50% - 280px)) 60px;
}

/* Header */
.mom-header {
  width: 100%; display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 36px;
}
.mom-back {
  display: flex; align-items: center; gap: 6px;
  color: rgba(199,168,135,0.5); text-decoration: none;
  font-family: var(--f-body); font-size: 13px;
  transition: color 0.2s;
}
.mom-back:hover { color: var(--gold); }
.mom-title {
  font-family: var(--f-display); font-size: 20px;
  color: rgba(250,247,242,0.75); text-align: center; flex:1;
}
.mom-spacer { width: 56px; }

/* Label */
.sec-lbl {
  font-family: var(--f-body); font-size: 10px;
  letter-spacing: 4px; color: var(--gold); opacity: 0.5;
  text-align: center; margin-bottom: 8px; font-weight: 600;
}

.sec-h {
  font-family: var(--f-display); font-size: clamp(22px, 6vw, 30px);
  color: var(--cream); text-align: center; margin-bottom: 8px;
  line-height: 1.4;
}

.frame-intro {
  font-size: 14px; color: #833943; line-height: 1.9;
  text-align: center; margin-bottom: 24px;
  max-width: 300px;
  font-family: var(--f-body);
}

/* Frame options */
.frame-opts  { display: flex; gap: 10px; margin-bottom: 18px; width: 100%; }
.frame-opt   {
  flex: 1; border-radius: 10px;
  border: 2px solid rgba(199,168,135,0.14);
  background: rgba(64,4,20,0.95);
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  padding: 12px 4px 10px; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.frame-opt.active { border-color: var(--gold); }
.frame-opt svg    { width: 28px; height: 28px; }
.frame-opt-l      { font-size: 10px; color: #6b2438; font-family: var(--f-body); }
.frame-opt.active .frame-opt-l { color: var(--gold); }

/* Upload */
.up-area {
  border: 1.5px dashed rgba(199,168,135,0.22); border-radius: 14px;
  padding: 28px 18px; margin-bottom: 14px; text-align: center;
  cursor: pointer; background: rgba(199,168,135,0.02);
  -webkit-tap-highlight-color: transparent;
  width: 100%;
}
.up-area input { display: none; }
.up-ico   { width: 40px; margin: 0 auto 10px; opacity: 0.35; }
.up-ico svg { width: 40px; height: 40px; }
.up-txt   { font-size: 14px; color: #833943; font-family: var(--f-body); }
.up-sub   { font-size: 11px; color: #6b2438; margin-top: 4px; font-family: var(--f-body); }

/* Canvas */
.txt-inp {
  width: 100%;
  background: rgba(64,4,20,0.95);
  border: 1px solid rgba(199,168,135,0.15); border-radius: 10px;
  padding: 12px 16px;
  font-family: var(--f-display); font-size: 15px;
  color: var(--cream); text-align: right; direction: rtl;
  outline: none; margin-bottom: 14px;
}
.txt-inp:focus { border-color: rgba(199,168,135,0.4); }
.txt-inp::placeholder { color: #6b2438; }

.cv-wrap {
  width: 100%; border-radius: 14px; overflow: hidden;
  margin-bottom: 14px; background: #4c061f;
}
.cv-wrap canvas { width: 100%; height: auto; display: block; }

.f-btns { display: flex; gap: 10px; width: 100%; }
.btn-gold {
  flex: 1;
  background: linear-gradient(135deg,#c7a887,#907055);
  color: #38040f; font-family: var(--f-display); font-size: 14px;
  font-weight: 700; padding: 13px; border-radius: 10px;
  border: none; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 4px 20px rgba(199,168,135,0.2);
}
.btn-out {
  flex: 1; background: transparent; color: var(--gold-l);
  font-family: var(--f-body); font-size: 14px;
  padding: 13px; border-radius: 10px;
  border: 1px solid rgba(199,168,135,0.25);
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}

/* Ambient particles */
.sp {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 1; overflow: hidden;
}
.sp-o {
  position: absolute; border-radius: 50%;
  background: radial-gradient(circle, var(--c, rgba(199,168,135,0.18)) 0%, transparent 70%);
  animation: spFloat var(--t, 7s) var(--d, 0s) ease-in-out infinite;
}
@keyframes spFloat {
  0%,100% { transform: translate(0,0) scale(1); }
  33%     { transform: translate(var(--x1,10px), var(--y1,-16px)) scale(1.08); }
  66%     { transform: translate(var(--x2,-8px), var(--y2,-8px)) scale(0.94); }
}
.sp-drift {
  position: absolute; border-radius: 50%;
  background: var(--c, rgba(199,168,135,0.38));
  animation: spDrift var(--t, 6s) var(--d, 0s) linear infinite;
}
@keyframes spDrift {
  0%   { transform: translateY(0) translateX(0); opacity:0; }
  8%   { opacity:1; }
  88%  { opacity:0.5; }
  100% { transform: translateY(-110px) translateX(var(--dx,14px)); opacity:0; }
}
.sp-s {
  position: absolute; border-radius: 50%;
  background: var(--c, #c7a887);
  animation: spSpark var(--t, 3s) var(--d, 0s) ease-in-out infinite;
}
@keyframes spSpark {
  0%,100% { opacity:0; transform:scale(0); }
  45%,55% { opacity:var(--a,0.65); transform:scale(1); }
}
</style>
</head>
<body>

<canvas id="starsBg"></canvas>

<!-- Ambient particles -->
<div class="sp">
  <div class="sp-o" style="width:280px;height:280px;top:-80px;right:-90px;--c:rgba(199,168,135,0.10);--t:10s;--d:0s;--x1:18px;--y1:22px;--x2:-12px;--y2:16px;"></div>
  <div class="sp-o" style="width:200px;height:200px;bottom:-60px;left:-70px;--c:rgba(137,10,55,0.12);--t:11s;--d:2s;--x1:-14px;--y1:-18px;--x2:10px;--y2:-12px;"></div>
  <div class="sp-o" style="width:120px;height:120px;top:40%;left:5%;--t:8s;--d:1.5s;--x1:-8px;--y1:14px;--x2:10px;--y2:-8px;"></div>
  <div class="sp-drift" style="width:3px;height:3px;bottom:25%;left:18%;--t:7s;--d:0s;--dx:14px;"></div>
  <div class="sp-drift" style="width:2px;height:2px;bottom:15%;left:52%;--t:5.5s;--d:2s;--dx:-8px;--c:rgba(199,168,135,0.28);"></div>
  <div class="sp-drift" style="width:2px;height:2px;bottom:30%;right:20%;--t:8s;--d:1s;--dx:6px;--c:rgba(137,10,55,0.42);"></div>
  <div class="sp-s" style="width:3px;height:3px;top:12%;left:10%;--t:3s;--d:0.5s;--a:0.55;"></div>
  <div class="sp-s" style="width:2px;height:2px;top:18%;right:8%;--t:3.5s;--d:1.4s;--a:0.5;--c:#890a37;"></div>
</div>

<div id="app">
  <div class="wrap">
    <div class="mom-header">
      <a class="mom-back" href="main.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        رجوع
      </a>
      <div class="mom-title">ذكرى الليلة</div>
      <div class="mom-spacer"></div>
    </div>

    <div class="sec-lbl">ذكرى الليلة</div>
    <h2 class="sec-h">احتفظ بهذه اللحظة</h2>
    <p class="frame-intro">
      أضف لمستك الخاصة على صورتك من هذه الليلة<br>
      واحتفظ بها كذكرى رقمية من قاب حلم
    </p>

    <div class="frame-opts">
      <div class="frame-opt" :class="{ active: activeFrame === 0 }" @click="selectFrame(0)">
        <svg viewBox="0 0 36 36" fill="none">
          <rect x="2" y="2" width="32" height="32" rx="2" stroke="#c7a887" stroke-width="1.4"/>
          <path d="M2 2 L7 7 M34 2 L29 7 M2 34 L7 29 M34 34 L29 29" stroke="#c7a887" stroke-width="1.4"/>
        </svg>
        <span class="frame-opt-l">الذهبي</span>
      </div>
      <div class="frame-opt" :class="{ active: activeFrame === 1 }" @click="selectFrame(1)">
        <svg viewBox="0 0 36 36" fill="none">
          <rect x="2" y="2" width="32" height="32" rx="2" stroke="#890a37" stroke-width="1.4"/>
          <line x1="2" y1="10" x2="36" y2="10" stroke="#890a37" stroke-width="0.5" opacity="0.4"/>
          <line x1="2" y1="26" x2="36" y2="26" stroke="#c7a887" stroke-width="0.5" opacity="0.4"/>
          <circle cx="18" cy="18" r="4" stroke="#c7a887" stroke-width="0.8"/>
        </svg>
        <span class="frame-opt-l">العريق</span>
      </div>
      <div class="frame-opt" :class="{ active: activeFrame === 2 }" @click="selectFrame(2)">
        <svg viewBox="0 0 36 36" fill="none">
          <rect x="2" y="2" width="32" height="32" rx="2" stroke="#c7a887" stroke-width="1"/>
          <circle cx="18" cy="18" r="3" stroke="#c7a887" stroke-width="0.8"/>
          <circle cx="18" cy="6" r="0.8" fill="#c7a887" opacity="0.5"/>
          <circle cx="18" cy="30" r="0.8" fill="#c7a887" opacity="0.5"/>
          <circle cx="6" cy="18" r="0.8" fill="#890a37" opacity="0.7"/>
          <circle cx="30" cy="18" r="0.8" fill="#890a37" opacity="0.7"/>
        </svg>
        <span class="frame-opt-l">الليل</span>
      </div>
    </div>

    <div class="up-area" v-show="!isImageUploaded" @click="$refs.fileInput.click()">
      <input type="file" ref="fileInput" @change="handleFileUpload" accept="image/*">
      <div class="up-ico">
        <svg viewBox="0 0 48 48" fill="none" stroke="#c7a887" stroke-width="1.5" stroke-linecap="round">
          <rect x="6" y="6" width="36" height="36" rx="4"/>
          <polyline points="24 30 24 18 18 24"/>
          <polyline points="24 18 30 24"/>
        </svg>
      </div>
      <div class="up-txt">اضغط لرفع صورتك</div>
      <div class="up-sub">PNG أو JPG من مكتبة هاتفك</div>
    </div>

    <div v-show="isImageUploaded" style="width:100%;">
      <input type="text" class="txt-inp" v-model="frameText" placeholder="اكتب اسمك أو عبارة تذكارية (اختياري)" maxlength="40">
      <div class="cv-wrap">
        <canvas ref="fCvRef" width="1080" height="1080"></canvas>
      </div>
      <div class="f-btns">
        <button class="btn-gold" @click="downloadFrame">تحميل الصورة</button>
        <button class="btn-out"  @click="renderFrame">تحديث الإطار</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── STARS ──
(function() {
  const cv = document.getElementById('starsBg');
  const ctx = cv.getContext('2d');
  let W, H, stars = [], last = 0;
  function resize() {
    W = cv.width  = window.innerWidth;
    H = cv.height = window.innerHeight;
    stars = [];
    const n = Math.floor((W * H) / 5500);
    for (let i = 0; i < n; i++) {
      stars.push({
        x: Math.random()*W, y: Math.random()*H,
        r: Math.random()*0.9+0.15,
        a: Math.random()*0.38+0.06,
        sp: Math.random()*0.5+0.2,
        ph: Math.random()*6.28
      });
    }
  }
  function draw(t) {
    requestAnimationFrame(draw);
    if (t - last < 33) return; last = t;
    ctx.clearRect(0, 0, W, H);
    for (const s of stars) {
      s.ph += s.sp * 0.012;
      const a = s.a * (0.5 + 0.5 * Math.sin(s.ph));
      ctx.globalAlpha = a;
      ctx.fillStyle   = '#e8d5b8';
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  resize(); requestAnimationFrame(draw);
  window.addEventListener('resize', resize);
})();

// ── VUE APP ──
const { createApp, ref, watch, nextTick } = Vue;

createApp({
  setup() {
    const activeFrame     = ref(0);
    const isImageUploaded = ref(false);
    const frameText       = ref('');
    const uploadedImage   = ref(null);
    const fCvRef          = ref(null);
    const fileInput       = ref(null);

    const selectFrame = i => {
      activeFrame.value = i;
      if (uploadedImage.value) renderFrame();
    };

    const handleFileUpload = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
          uploadedImage.value   = img;
          isImageUploaded.value = true;
          nextTick(() => renderFrame());
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    };

    watch(frameText, () => { if (uploadedImage.value) renderFrame(); });

    const renderFrame = () => {
      if (!uploadedImage.value || !fCvRef.value) return;
      const cv = fCvRef.value, c = cv.getContext('2d');
      const W = 1080, H = 1080, img = uploadedImage.value;
      c.clearRect(0, 0, W, H);
      const sc = Math.max(W / img.width, H / img.height);
      c.drawImage(img, (W - img.width*sc)/2, (H - img.height*sc)/2, img.width*sc, img.height*sc);
      if      (activeFrame.value === 0) drawGoldFrame(c, W, H);
      else if (activeFrame.value === 1) drawTealFrame(c, W, H);
      else                               drawNightFrame(c, W, H);
      if (frameText.value.trim()) {
        c.textAlign  = 'center';
        c.font       = `bold ${W*0.038}px "Amiri","Geeza Pro",serif`;
        c.shadowColor = 'rgba(0,0,0,0.95)';
        c.shadowBlur  = 18;
        c.fillStyle  = 'rgba(199,168,135,0.92)';
        c.fillText(frameText.value.trim(), W/2, activeFrame.value === 0 ? H*0.78 : H*0.84);
        c.shadowBlur = 0;
      }
    };

    const drawGoldFrame = (c, W, H) => {
      const m = 38, cs = 56;
      const v = c.createRadialGradient(W/2,H/2,H*0.22,W/2,H/2,H*0.72);
      v.addColorStop(0,'rgba(0,0,0,0)'); v.addColorStop(1,'rgba(0,0,0,0.62)');
      c.fillStyle = v; c.fillRect(0,0,W,H);
      c.strokeStyle = '#c7a887'; c.lineWidth = 7; c.strokeRect(m,m,W-m*2,H-m*2);
      c.strokeStyle = 'rgba(199,168,135,0.38)'; c.lineWidth = 2; c.strokeRect(m+14,m+14,W-(m+14)*2,H-(m+14)*2);
      c.strokeStyle = '#d9c4a4'; c.lineWidth = 4;
      [[m,m,1,1],[W-m,m,-1,1],[m,H-m,1,-1],[W-m,H-m,-1,-1]].forEach(p => {
        c.beginPath(); c.moveTo(p[0],p[1]+cs*p[3]); c.lineTo(p[0],p[1]); c.lineTo(p[0]+cs*p[2],p[1]); c.stroke();
      });
      const beam = c.createLinearGradient(W/2-30,0,W/2+30,0);
      beam.addColorStop(0,'rgba(199,168,135,0)'); beam.addColorStop(0.5,'rgba(199,168,135,0.08)'); beam.addColorStop(1,'rgba(199,168,135,0)');
      c.fillStyle = beam; c.fillRect(W/2-80,0,160,H);
      const bh = H*0.13, bg = c.createLinearGradient(0,H-bh,0,H);
      bg.addColorStop(0,'rgba(0,0,0,0)'); bg.addColorStop(0.4,'rgba(76,6,31,0.82)'); bg.addColorStop(1,'rgba(76,6,31,0.96)');
      c.fillStyle = bg; c.fillRect(0,H-bh,W,bh);
      c.textAlign = 'center';
      c.fillStyle = '#d9c4a4'; c.font = `bold ${W*0.052}px "Amiri","Geeza Pro",serif`; c.fillText('قاب حلم',W/2,H-bh*0.48);
      c.fillStyle = 'rgba(250,247,242,0.55)'; c.font = `${W*0.022}px "Amiri","Geeza Pro",serif`; c.fillText('UFUQ Graduation 2026',W/2,H-bh*0.2);
    };

    const drawTealFrame = (c, W, H) => {
      const m = 32;
      const ov = c.createLinearGradient(0,0,0,H);
      ov.addColorStop(0,'rgba(76,6,31,0.32)'); ov.addColorStop(0.5,'rgba(0,0,0,0)'); ov.addColorStop(1,'rgba(76,6,31,0.55)');
      c.fillStyle = ov; c.fillRect(0,0,W,H);
      const beam = c.createLinearGradient(W/2-40,0,W/2+40,0);
      beam.addColorStop(0,'rgba(199,168,135,0)'); beam.addColorStop(0.5,'rgba(199,168,135,0.12)'); beam.addColorStop(1,'rgba(199,168,135,0)');
      c.fillStyle = beam; c.fillRect(W/2-100,0,200,H*0.7);
      c.strokeStyle = 'rgba(137,10,55,0.7)'; c.lineWidth = 5; c.strokeRect(m,m,W-m*2,H-m*2);
      c.strokeStyle = 'rgba(199,168,135,0.35)'; c.lineWidth = 1.5; c.strokeRect(m+10,m+10,W-(m+10)*2,H-(m+10)*2);
      [[m+2,m+2],[W-m-2,m+2],[m+2,H-m-2],[W-m-2,H-m-2]].forEach(p => {
        c.beginPath(); c.arc(p[0],p[1],7,0,6.283); c.fillStyle = 'rgba(137,10,55,0.7)'; c.fill();
      });
      const th = H*0.10, tg = c.createLinearGradient(0,0,0,th);
      tg.addColorStop(0,'rgba(76,6,31,0.92)'); tg.addColorStop(1,'rgba(0,0,0,0)');
      c.fillStyle = tg; c.fillRect(0,0,W,th);
      c.textAlign = 'center'; c.fillStyle = 'rgba(250,247,242,0.82)';
      c.font = `${W*0.028}px "Amiri","Geeza Pro",serif`; c.fillText('UFUQ Graduation 2026',W/2,th*0.62);
      const bh = H*0.10, bg = c.createLinearGradient(0,H-bh,0,H);
      bg.addColorStop(0,'rgba(0,0,0,0)'); bg.addColorStop(1,'rgba(76,6,31,0.92)');
      c.fillStyle = bg; c.fillRect(0,H-bh,W,bh);
      c.fillStyle = '#d9c4a4'; c.font = `bold ${W*0.042}px "Amiri","Geeza Pro",serif`; c.fillText('قاب حلم',W/2,H-bh*0.3);
    };

    const drawNightFrame = (c, W, H) => {
      const m = 38;
      const v = c.createRadialGradient(W/2,H/2,H*0.18,W/2,H/2,H*0.78);
      v.addColorStop(0,'rgba(0,0,0,0)'); v.addColorStop(1,'rgba(46,3,15,0.74)');
      c.fillStyle = v; c.fillRect(0,0,W,H);
      for (let i = 0; i < 60; i++) {
        const sx=Math.random()*W, sy=Math.random()*H*0.65;
        const sr=Math.random()*1.6+0.3, sa=Math.random()*0.6+0.1;
        const tp=Math.random();
        c.beginPath(); c.arc(sx,sy,sr,0,6.283);
        c.fillStyle = tp<0.15?`rgba(199,168,135,${sa})`:tp<0.25?`rgba(131,57,67,${sa})`:`rgba(220,235,245,${sa})`;
        c.fill();
      }
      const beam = c.createLinearGradient(W/2-50,0,W/2+50,0);
      beam.addColorStop(0,'rgba(199,168,135,0)'); beam.addColorStop(0.5,'rgba(199,168,135,0.13)'); beam.addColorStop(1,'rgba(199,168,135,0)');
      c.fillStyle = beam; c.fillRect(W/2-100,0,200,H*0.72);
      c.strokeStyle = 'rgba(199,168,135,0.6)'; c.lineWidth = 4; c.strokeRect(m,m,W-m*2,H-m*2);
      [[m,m],[W-m,m],[m,H-m],[W-m,H-m]].forEach(p => {
        c.beginPath(); c.arc(p[0],p[1],5,0,6.283); c.fillStyle = 'rgba(199,168,135,0.7)'; c.fill();
      });
      const bh = H*0.14, bg = c.createLinearGradient(0,H-bh,0,H);
      bg.addColorStop(0,'rgba(0,0,0,0)'); bg.addColorStop(0.5,'rgba(46,3,15,0.82)'); bg.addColorStop(1,'rgba(46,3,15,0.96)');
      c.fillStyle = bg; c.fillRect(0,H-bh,W,bh);
      c.textAlign = 'center'; c.fillStyle = '#d9c4a4';
      c.font = `bold ${W*0.046}px "Amiri","Geeza Pro",serif`; c.fillText('قاب حلم',W/2,H-bh*0.5);
      c.fillStyle = 'rgba(250,247,242,0.6)'; c.font = `${W*0.024}px "Amiri","Geeza Pro",serif`; c.fillText('UFUQ · 2026',W/2,H-bh*0.2);
    };

    const downloadFrame = () => {
      try {
        const a = document.createElement('a');
        a.download = 'قاب-حلم-UFUQ-2026.png';
        a.href = fCvRef.value.toDataURL('image/png');
        a.click();
      } catch(e) {
        alert('لحفظ الصورة: اضغط مطولاً على الصورة ثم اختر "حفظ الصورة"');
      }
    };

    return {
      activeFrame, isImageUploaded, frameText,
      fCvRef, fileInput,
      selectFrame, handleFileUpload, renderFrame, downloadFrame
    };
  }
}).mount('#app');
</script>
