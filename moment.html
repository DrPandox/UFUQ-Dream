<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نشر الإطار — قاب حلم</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --f-display: 'Amiri',"Geeza Pro","Traditional Arabic","Arabic Typesetting",Georgia,serif;
  --f-body:    'Cairo',"Geeza Pro","Arabic Typesetting",Tahoma,Arial,sans-serif;
  --bg:   #2a0312;
  --gold: #c7a887;
  --gold-l: #d9c4a4;
  --cream: #faf7f2;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { height:100%; -webkit-text-size-adjust:100%; }
body {
  background: var(--bg);
  color: var(--cream);
  font-family: var(--f-body);
  direction: rtl;
  min-height: 100%;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

#starsBg { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }

#app { animation: pageIn 1.1s cubic-bezier(0.25,0.46,0.45,0.94) both; }
@keyframes pageIn {
  0%   { opacity:0; transform:scale(1.04); }
  100% { opacity:1; transform:scale(1); }
}

.wrap {
  position:relative; z-index:2;
  min-height:100vh;
  display:flex; flex-direction:column;
  align-items:center; justify-content:flex-start;
  padding: 48px max(16px, calc(50% - 260px)) 80px;
}

/* Header */
.mom-header {
  width:100%; display:flex; align-items:center;
  justify-content:space-between; margin-bottom:28px;
}
.mom-back {
  display:flex; align-items:center; gap:6px;
  color:rgba(199,168,135,0.5); text-decoration:none;
  font-size:13px; transition:color 0.2s;
}
.mom-back:hover { color:var(--gold); }
.mom-title {
  font-family:var(--f-display); font-size:20px;
  color:rgba(250,247,242,0.75); text-align:center; flex:1;
}
.mom-spacer { width:56px; }

/* Intro */
.sec-lbl {
  font-size:10px; letter-spacing:4px; color:var(--gold);
  opacity:0.5; text-align:center; margin-bottom:8px; font-weight:600;
}
.sec-h {
  font-family:var(--f-display); font-size:clamp(22px,6vw,28px);
  color:var(--cream); text-align:center; margin-bottom:6px; line-height:1.4;
}
.sec-sub {
  font-size:13px; color:#833943; line-height:1.9;
  text-align:center; margin-bottom:24px;
}

/* Upload area */
.up-area {
  border:1.5px dashed rgba(199,168,135,0.22); border-radius:14px;
  padding:32px 18px; margin-bottom:14px; text-align:center;
  cursor:pointer; background:rgba(199,168,135,0.02);
  -webkit-tap-highlight-color:transparent; width:100%;
  transition:border-color 0.2s;
}
.up-area:hover { border-color:rgba(199,168,135,0.5); }
.up-area input { display:none; }
.up-ico { width:40px; margin:0 auto 10px; opacity:0.35; }
.up-ico svg { width:40px; height:40px; }
.up-txt { font-size:14px; color:#c8a45a; }
.up-sub { font-size:11px; color:#6b2438; margin-top:4px; }

/* Camera button */
.cam-btn {
  width:100%; background:rgba(199,168,135,0.07);
  border:1px solid rgba(199,168,135,0.2); border-radius:10px;
  color:var(--gold); font-family:var(--f-body); font-size:13px;
  padding:12px; cursor:pointer; margin-bottom:14px;
  display:flex; align-items:center; justify-content:center; gap:8px;
  -webkit-tap-highlight-color:transparent;
}

/* Preview canvas */
.cv-wrap {
  width:100%; border-radius:14px; overflow:hidden;
  margin-bottom:16px; background:#1a0008;
  box-shadow:0 8px 40px rgba(0,0,0,0.5);
}
.cv-wrap canvas { width:100%; height:auto; display:block; }

/* Camera live view */
.cam-wrap {
  width:100%; border-radius:14px; overflow:hidden;
  margin-bottom:14px; position:relative; background:#000;
}
.cam-wrap video { width:100%; display:block; max-height:60vh; object-fit:cover; }
.cam-frame-overlay {
  position:absolute; inset:0;
  background-image:var(--frame-url);
  background-size:100% 100%;
  pointer-events:none;
}
.snap-btn {
  width:64px; height:64px; border-radius:50%;
  background:linear-gradient(135deg,#c7a887,#907055);
  border:3px solid #fff; cursor:pointer;
  display:block; margin:0 auto 14px;
  -webkit-tap-highlight-color:transparent;
  box-shadow:0 4px 20px rgba(199,168,135,0.4);
}

/* Action buttons */
.f-btns { display:flex; gap:10px; width:100%; }
.btn-gold {
  flex:1; background:linear-gradient(135deg,#c7a887,#907055);
  color:#38040f; font-family:var(--f-display); font-size:16px;
  font-weight:700; padding:14px; border-radius:10px;
  border:none; cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  box-shadow:0 4px 20px rgba(199,168,135,0.3);
  transition:opacity 0.2s;
}
.btn-gold:disabled { opacity:0.6; cursor:not-allowed; }
.btn-out {
  flex:1; background:transparent; color:var(--gold-l);
  font-size:14px; padding:14px; border-radius:10px;
  border:1px solid rgba(199,168,135,0.25);
  cursor:pointer; -webkit-tap-highlight-color:transparent;
}

/* Published state */
.pub-done {
  width:100%; text-align:center; padding:24px 0;
}
.pub-check {
  font-size:56px; margin-bottom:12px;
}
.pub-msg {
  font-family:var(--f-display); font-size:22px;
  color:var(--gold); margin-bottom:8px;
}
.pub-sub {
  font-size:13px; color:#833943;
}

/* Ambient particles */
.sp { position:fixed; inset:0; pointer-events:none; z-index:1; overflow:hidden; }
.sp-o {
  position:absolute; border-radius:50%;
  background:radial-gradient(circle, var(--c, rgba(199,168,135,0.18)) 0%, transparent 70%);
  animation:spFloat var(--t, 7s) var(--d, 0s) ease-in-out infinite;
}
@keyframes spFloat {
  0%,100% { transform:translate(0,0) scale(1); }
  33%     { transform:translate(var(--x1,10px), var(--y1,-16px)) scale(1.08); }
  66%     { transform:translate(var(--x2,-8px), var(--y2,-8px)) scale(0.94); }
}
.sp-s {
  position:absolute; border-radius:50%;
  background:var(--c,#c7a887);
  animation:spSpark var(--t,3s) var(--d,0s) ease-in-out infinite;
}
@keyframes spSpark {
  0%,100% { opacity:0; transform:scale(0); }
  45%,55% { opacity:var(--a,0.65); transform:scale(1); }
}
</style>
</head>
<body>

<canvas id="starsBg"></canvas>

<div class="sp">
  <div class="sp-o" style="width:280px;height:280px;top:-80px;right:-90px;--c:rgba(199,168,135,0.10);--t:10s;--d:0s;--x1:18px;--y1:22px;--x2:-12px;--y2:16px;"></div>
  <div class="sp-o" style="width:200px;height:200px;bottom:-60px;left:-70px;--c:rgba(137,10,55,0.12);--t:11s;--d:2s;--x1:-14px;--y1:-18px;--x2:10px;--y2:-12px;"></div>
  <div class="sp-s" style="width:3px;height:3px;top:12%;left:10%;--t:3s;--d:0.5s;--a:0.55;"></div>
  <div class="sp-s" style="width:2px;height:2px;top:18%;right:8%;--t:3.5s;--d:1.4s;--a:0.5;--c:#890a37;"></div>
</div>

<div id="app">
  <div class="wrap">

    <div class="mom-header">
      <a class="mom-back" href="main.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        رجوع
      </a>
      <div class="mom-title">إطار قاب حلم</div>
      <div class="mom-spacer"></div>
    </div>

    <div class="sec-lbl">اللحظة الخاصة</div>
    <h2 class="sec-h">التقط صورتك مع الإطار</h2>
    <p class="sec-sub">شاركها على إنستغرام مع وسم @ufuq</p>

    <!-- Step 1: choose photo source -->
    <template v-if="!photoReady && !cameraOn">
      <div class="up-area" @click="$refs.fileInput.click()">
        <input type="file" ref="fileInput" @change="handleFileUpload" accept="image/*">
        <div class="up-ico">
          <svg viewBox="0 0 48 48" fill="none" stroke="#c7a887" stroke-width="1.5" stroke-linecap="round">
            <rect x="6" y="6" width="36" height="36" rx="4"/>
            <polyline points="24 30 24 18 18 24"/>
            <polyline points="24 18 30 24"/>
          </svg>
        </div>
        <div class="up-txt">اختر صورة من مكتبتك</div>
        <div class="up-sub">PNG أو JPG</div>
      </div>

      <button class="cam-btn" @click="startCamera">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        أو التقط صورة من الكاميرا
      </button>
    </template>

    <!-- Step 2: Live camera view -->
    <template v-if="cameraOn && !photoReady">
      <div class="cam-wrap">
        <video ref="videoRef" autoplay playsinline muted></video>
        <div class="cam-frame-overlay" :style="{ '--frame-url': 'url(assets/frame.png)' }"></div>
      </div>
      <button class="snap-btn" @click="snapPhoto" title="التقاط"></button>
      <button class="btn-out" style="width:100%;margin-bottom:14px;" @click="stopCamera">إلغاء</button>
    </template>

    <!-- Step 3: Preview + actions -->
    <template v-if="photoReady && !published">
      <div class="cv-wrap">
        <canvas ref="fCvRef" :width="CW" :height="CH"></canvas>
      </div>
      <div class="f-btns">
        <button class="btn-gold" :disabled="publishing" @click="publishFrame">
          {{ publishing ? '…' : 'نشر' }}
        </button>
        <button class="btn-out" @click="reset">إعادة</button>
      </div>
      <p style="font-size:11px;color:#5a2030;text-align:center;margin-top:10px;">
        سيتم حفظ الصورة في هاتفك وفتح مشاركة إنستغرام
      </p>
    </template>

    <!-- Step 4: Published confirmation -->
    <div class="pub-done" v-if="published">
      <div class="pub-check">✨</div>
      <div class="pub-msg">تم النشر!</div>
      <p class="pub-sub">شارك الصورة مع @ufuq على إنستغرام</p>
      <button class="btn-gold" style="margin-top:24px;width:100%;" @click="reset">صورة جديدة</button>
    </div>

  </div>
</div>

<script>
// ── STARS ──
(function() {
  const cv = document.getElementById('starsBg');
  const ctx = cv.getContext('2d');
  let W, H, stars = [], last = 0;
  function resize() {
    W = cv.width  = window.innerWidth;
    H = cv.height = window.innerHeight;
    stars = [];
    const n = Math.floor((W * H) / 5500);
    for (let i = 0; i < n; i++) stars.push({ x:Math.random()*W, y:Math.random()*H, r:Math.random()*0.9+0.15, a:Math.random()*0.38+0.06, sp:Math.random()*0.5+0.2, ph:Math.random()*6.28 });
  }
  function draw(t) {
    requestAnimationFrame(draw);
    if (t - last < 33) return; last = t;
    ctx.clearRect(0, 0, W, H);
    for (const s of stars) {
      s.ph += s.sp * 0.012;
      ctx.globalAlpha = s.a * (0.5 + 0.5 * Math.sin(s.ph));
      ctx.fillStyle = '#e8d5b8';
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  resize(); requestAnimationFrame(draw);
  window.addEventListener('resize', resize);
})();

// ── CONFIG ──
const BACKEND_URL = 'https://138-68-79-195.nip.io';

// ── VUE APP ──
const { createApp, ref, nextTick } = Vue;

createApp({
  setup() {
    // Canvas dimensions — driven by frame image natural size
    const CW = ref(1080);
    const CH = ref(1920);

    const photoReady  = ref(false);
    const cameraOn    = ref(false);
    const publishing  = ref(false);
    const published   = ref(false);

    const fCvRef  = ref(null);
    const videoRef = ref(null);
    let _stream   = null;
    let _userImg  = null;

    // Transparent window inside the frame (detected on load)
    let _photoArea = null; // { x, y, w, h } in frame pixels

    // Detect the bounding box of transparent pixels in the frame
    function detectPhotoArea(img) {
      const tmp = document.createElement('canvas');
      tmp.width  = img.naturalWidth;
      tmp.height = img.naturalHeight;
      const ctx  = tmp.getContext('2d');
      ctx.drawImage(img, 0, 0);
      const data = ctx.getImageData(0, 0, tmp.width, tmp.height).data;
      let minX = tmp.width, maxX = 0, minY = tmp.height, maxY = 0;
      for (let y = 0; y < tmp.height; y++) {
        for (let x = 0; x < tmp.width; x++) {
          const alpha = data[(y * tmp.width + x) * 4 + 3];
          if (alpha < 50) { // transparent pixel
            if (x < minX) minX = x;
            if (x > maxX) maxX = x;
            if (y < minY) minY = y;
            if (y > maxY) maxY = y;
          }
        }
      }
      // Fallback: full canvas if no transparency found
      if (minX >= maxX || minY >= maxY) return { x: 0, y: 0, w: tmp.width, h: tmp.height };
      return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
    }

    // Load frame PNG — set canvas size to its exact dimensions
    const frameImg = new Image();
    frameImg.onload = () => {
      CW.value = frameImg.naturalWidth;
      CH.value = frameImg.naturalHeight;
      _photoArea = detectPhotoArea(frameImg);
      if (_userImg) renderFrame(_userImg); // re-render if photo already loaded
    };
    frameImg.src = 'assets/frame.png';

    // ─── File upload ───
    const handleFileUpload = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
          _userImg = img;
          photoReady.value = true;
          nextTick(() => renderFrame(_userImg));
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    };

    // ─── Camera ───
    const startCamera = async () => {
      try {
        _stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
        cameraOn.value = true;
        await nextTick();
        if (videoRef.value) videoRef.value.srcObject = _stream;
      } catch (e) {
        alert('تعذّر الوصول إلى الكاميرا. استخدم رفع الصورة بدلاً من ذلك.');
      }
    };

    const stopCamera = () => {
      if (_stream) { _stream.getTracks().forEach(t => t.stop()); _stream = null; }
      cameraOn.value = false;
    };

    const snapPhoto = () => {
      const vid = videoRef.value;
      if (!vid) return;
      // Draw video frame to offscreen canvas then load as image
      const tmp = document.createElement('canvas');
      tmp.width = vid.videoWidth || 640;
      tmp.height = vid.videoHeight || 480;
      tmp.getContext('2d').drawImage(vid, 0, 0);
      stopCamera();
      const img = new Image();
      img.onload = () => {
        _userImg = img;
        photoReady.value = true;
        nextTick(() => renderFrame(_userImg));
      };
      img.src = tmp.toDataURL('image/jpeg', 0.95);
    };

    // ─── Render ───
    const renderFrame = (img) => {
      const cv = fCvRef.value;
      if (!cv || !img) return;
      const W = CW.value, H = CH.value;
      if (!W || !H) return;
      const c = cv.getContext('2d');
      c.clearRect(0, 0, W, H);

      // Fill dark background
      c.fillStyle = '#7a0a2a';
      c.fillRect(0, 0, W, H);

      // Draw user photo scaled to fill only the transparent window area
      const area = _photoArea || { x: 0, y: 0, w: W, h: H };
      const sc   = Math.max(area.w / img.width, area.h / img.height);
      const dw   = img.width * sc, dh = img.height * sc;
      // Clip to the photo window so it doesn't bleed into the frame border
      c.save();
      c.beginPath();
      c.rect(area.x, area.y, area.w, area.h);
      c.clip();
      c.drawImage(img, area.x + (area.w - dw) / 2, area.y + (area.h - dh) / 2, dw, dh);
      c.restore();

      // Draw frame on top at its exact natural size
      c.drawImage(frameImg, 0, 0, W, H);
    };

    // ─── Publish ───
    const publishFrame = async () => {
      publishing.value = true;
      const cv = fCvRef.value;

      try {
        // 1. Save to DB (fire and forget, don't block UX)
        const name  = localStorage.getItem('guestName')  || 'ضيف';
        const phone = localStorage.getItem('guestPhone') || '';
        fetch(BACKEND_URL + '/api/selfie/publish', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, phone })
        }).catch(() => {});

        // 2. Get image blob from canvas
        const blob = await new Promise(r => cv.toBlob(r, 'image/png'));
        const file = new File([blob], 'قاب-حلم-2026.png', { type: 'image/png' });
        const objUrl = URL.createObjectURL(blob);

        // 3. Try native share (opens Instagram on mobile)
        const shareText = 'نحن الآن قاب حلم ✨ @ufuq #قاب_حلم_2026';
        let shared = false;
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          try {
            await navigator.share({ files: [file], title: 'قاب حلم 2026', text: shareText });
            shared = true;
          } catch (_) { /* user cancelled share */ }
        }

        // 4. Always also download to phone
        const a = document.createElement('a');
        a.href = objUrl;
        a.download = 'قاب-حلم-2026.png';
        a.click();
        setTimeout(() => URL.revokeObjectURL(objUrl), 3000);

        if (!shared) {
          // On desktop or if share wasn't available: show Instagram tip
          setTimeout(() => alert('تم حفظ الصورة في هاتفك\nافتح إنستغرام وشارك الصورة مع وسم @ufuq'), 500);
        }

        published.value = true;
      } catch (e) {
        alert('حدث خطأ أثناء النشر. حاول مرة أخرى.');
      } finally {
        publishing.value = false;
      }
    };

    // ─── Reset ───
    const reset = () => {
      _userImg = null;
      photoReady.value = false;
      published.value  = false;
      cameraOn.value   = false;
    };

    return {
      CW, CH,
      photoReady, cameraOn, publishing, published,
      fCvRef, videoRef,
      handleFileUpload,
      startCamera, stopCamera, snapPhoto,
      publishFrame, reset
    };
  }
}).mount('#app');
</script>
</body>
</html>
